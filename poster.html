<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Original Research Poster — Jackson Ronick</title>
<meta name="description" content="Original research poster: Using Weight Room Performance Data to Improve Position-Specific Training in High School Football, by Jackson Ronick.">
<style>
:root{--garnet:#73000a;--accent:#b58b2c;--bg:#2a0205;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,Helvetica,Arial,sans-serif;color:#f3e7d9;
  min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{text-align:center;padding:30px 20px 16px;max-width:900px}
header .eyebrow{letter-spacing:.18em;text-transform:uppercase;font-size:.7rem;color:#e7c98b;margin:0 0 10px}
header h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(1.2rem,3vw,1.7rem);line-height:1.25;margin:0;font-weight:700}
header .byline{margin-top:10px;color:#d9cfc4;font-size:.95rem}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:6px 0 18px}
.btn{display:inline-block;text-decoration:none;font-size:.9rem;letter-spacing:.02em;padding:11px 22px;border-radius:30px;
  background:var(--garnet);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn.ghost{background:transparent;color:#e7c98b;border-color:#7a5a1e}
.btn:hover{filter:brightness(1.12)}
.posterbox{width:100%;max-width:1000px;padding:0 16px 30px}
.posterbox img{width:100%;height:auto;display:block;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.5);background:#fff}
footer{color:#b9a596;font-size:.8rem;padding:0 20px 34px;text-align:center}
footer a{color:#e7c98b}
</style>
</head>
<body>
  <header>
    <p class="eyebrow">Original Research Poster</p>
    <h1>Using Weight Room Performance Data to Improve Position-Specific Training in High School Football</h1>
    <div class="byline">Jackson Ronick</div>
  </header>
  <div class="actions">
    <a class="btn" href="poster.jpg" target="_blank" rel="noopener">Open full size</a>
    <a class="btn ghost" href="./">View the web version</a>
  </div>
  <div class="posterbox">
    <a href="poster.jpg" target="_blank" rel="noopener"><img src="poster.jpg" alt="Research poster by Jackson Ronick"></a>
  </div>
  <footer>Research poster by <b>Jackson Ronick</b> &middot; <a href="./">Interactive web version</a></footer>
</body>
</html>
